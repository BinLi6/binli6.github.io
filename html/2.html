            <p id="jvzi"><span id="hitokoto_text"><br />1.天上有行云，人在行云里。<br />2.人生得意须尽欢，莫使金樽空对月。<br />3.哀其不幸，怒其不争。<br />4.凭君莫话封侯事，一将功成万骨枯。<br />5.欲买桂花同载酒，终不似，少年游。<br />6.春宵一刻值千金，花有清香月有阴。<br />7.羽衣常常烟霞色，不惹人间桃李花。</span>
